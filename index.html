<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your New Tomato Crush Moment</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Noto Sans KR", sans-serif;
        }

        body {
            overflow: hidden;
            background-color: #ffffff;
        }

        section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 4vw; 
        }

        /* 우측 하단 연두색 배경 */
        .circle {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #a4ce3a;
            clip-path: ellipse(40% 70% at 100% 100%);
            transition: background 0.5s ease;
            z-index: 1;
        }

        /* 헤더 / 내비게이션 */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5vw 4vw; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        header .logo {
            width: 4.5vw; 
            min-width: 45px;
        }

        header .logo img {
            width: 100%;
            display: block;
        }

        header ul {
            display: flex;
            gap: 2vw;
        }

        header ul li {
            list-style: none;
        }

        header ul li a {
            color: #777;
            text-decoration: none;
            font-size: clamp(10px, 1vw, 15px); 
            font-weight: 500;
            transition: color 0.3s;
        }

        header ul li a:hover {
            color: #111;
        }

        /* 메인 콘텐츠 영역 */
        .content {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        /* 텍스트 영역 */
        .content .textBox {
            position: relative;
            width: 50%; 
            margin-top: -3vw; 
        }

        .content .textBox .titleImg {
            width: 100%; 
            height: auto;
            display: block;
        }

        .content .textBox a.btn {
            display: inline-block;
            margin-top: 2vw;
            padding: 0.8vw 2vw;
            background: #e32626;
            color: #fff;
            border-radius: 40px;
            font-weight: 700;
            letter-spacing: 1px;
            text-decoration: none;
            font-size: clamp(10px, 1vw, 14px);
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(227, 38, 38, 0.2);
        }

        .content .textBox a.btn:hover {
            background: #c21d1d;
            transform: translateY(-2px);
        }

        /* 메인 제품 이미지 영역 */
        .content .imgBox {
            position: relative;
            width: 50%; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .content .imgBox .mainProduct {
            width: 60%; 
            height: auto;
            position: relative;
            z-index: 2;
            transform: rotate(-20deg); 
            transition: transform 0.3s ease; 
        }

        /* 가격 태그 */
        .content .imgBox .priceTag {
            position: absolute;
            bottom: -3vw; 
            right: 4vw;   
            width: 30%;   
            z-index: 3;
            transform: rotate(10deg); 
            transition: opacity 0.3s ease; /* 가격표 바뀔 때 부드러운 효과 (선택사항) */
        }

        /* 하단 썸네일 메뉴 */
        .thumb {
            position: absolute;
            bottom: 2vw;
            left: 4vw; 
            display: flex;
            align-items: flex-end;
            gap: 1.2vw; 
            z-index: 20;
        }

        .thumb li {
            list-style: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .thumb li:hover {
            transform: translateY(-8px);
        }

        .thumb li img {
            width: 4vw; 
            min-width: 35px;
            height: auto;
        }

        .thumb li.tomatoma img {
            width: 3.5vw; 
            min-width: 30px;
        }

        /* 우측 SNS 아이콘 */
        .sci {
            position: absolute;
            top: 50%;
            right: 2vw; 
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5vw;
            z-index: 100;
        }

        .sci li {
            list-style: none;
        }

        .sci li a img {
            width: 1.2vw;
            min-width: 16px;
            height: auto;
            transition: transform 0.3s;
        }

        .sci li a:hover img {
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    
    <section>
        <div class="circle"></div>
        
        <header>
            <a href="#" class="logo"><img src="./imgs/tomato_rogo.png" alt="Logo"></a>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Menu</a></li>
                <li><a href="#">What's New</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </header>

        <div class="content">
            <div class="textBox">
                <img src="./imgs/title2.png" alt="Title2" class="titleImg">
                <a href="#" class="btn">Learn More</a>
            </div>

            <div class="imgBox">
                <img src="./imgs/tomato.3.png" alt="Tomato Crush" class="mainProduct">
                <img src="./imgs/tomatoma2.png" alt="Price" class="priceTag">
            </div>
        </div>

        <ul class="thumb">
            <li>
                <img src="./imgs/mychu.png" alt="mychu" 
                     onclick="imgSlider('./imgs/mychu.png'); changeCircleColor('#66C142'); changeTitle('./imgs/title2.png'); changeLink('https://www.crown.co.kr/product/view?idx=316'); changePriceTag('./imgs/tomatoma2.png')">
            </li>
            <li>
                <img src="./imgs/pretz1.png" alt="pretz1" 
                     onclick="imgSlider('./imgs/tomato.3.png'); changeCircleColor('#a4ce3a'); changeTitle('./imgs/title2.png'); changeLink('https://haitaimall.co.kr/product/1/406/category/34/display/1/'); changePriceTag('./imgs/tomatoma2.png')">
            </li>
            <li>
                <img src="./imgs/candy.png" alt="candy" 
                     onclick="imgSlider('./imgs/candy.png'); changeCircleColor('#08B326'); changeTitle('./imgs/title2.png'); changeLink('#'); changePriceTag('./imgs/candy2.png')">
            </li>
            <li class="tomatoma">
                <img src="./imgs/tomatoma.png" alt="tomatoma" 
                     onclick="imgSlider('./imgs/tomatoma.png'); changeCircleColor('#fbb03b'); changeTitle('./imgs/title2.png'); changeLink('#'); changePriceTag('./imgs/tomatoma2.png')">
            </li>
        </ul>

        <ul class="sci">
            <li><a href="#"><img src="./imgs/twitter.png" alt="Twitter"></a></li>
            <li><a href="#"><img src="./imgs/facebook.png" alt="Facebook"></a></li>
            <li><a href="#"><img src="./imgs/instagram.png" alt="Instagram"></a></li>
        </ul>
    </section>

    <script>
        // 메인 제품 이미지 변경
        function imgSlider(anything) {
            document.querySelector('.mainProduct').src = anything;
        }

        // 배경색 변경
        function changeCircleColor(color) {
            const circle = document.querySelector('.circle');
            circle.style.background = color;
        }

        // 타이틀 이미지 변경
        function changeTitle(titleImgPath) {
            document.querySelector('.titleImg').src = titleImgPath;
        }

        // 버튼 링크 변경 함수
        function changeLink(linkUrl) {
            const btn = document.querySelector('.btn');
            btn.href = linkUrl;
            
            if (linkUrl !== '#') {
                btn.target = "_blank";
            } else {
                btn.target = "_self";
            }
        }

        // 🌟 새로 추가된 가격표 이미지 변경 함수
        function changePriceTag(priceImgPath) {
            document.querySelector('.priceTag').src = priceImgPath;
        }
    </script>
</body>
</html>
