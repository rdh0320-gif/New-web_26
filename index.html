<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your New Tomato Crush Moment</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Noto Sans KR", sans-serif;
        }

        body {
            overflow: hidden;
        }

        section {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background-color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 100px;
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        header .logo {
            position: relative;
            max-width: 80px;
        }

        header .logo img {
            width: 100%;
            height: auto;
        }

        header ul {
            position: relative;
            display: flex;
        }

        header ul li {
            list-style: none;
        }

        header ul li a {
            display: inline-block;
            color: #333;
            margin-left: 40px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
        }

        .content {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .content .textBox {
            position: relative;
            max-width: 650px;
        }

        /* ◀ 타이틀 이미지 크기를 가이드 시안 비율에 맞춰 대폭 확대 */
        .content .textBox .titleImg {
            max-width: 620px; 
            width: 200%;
            height: auto;
            display: block;
        }

        .content .textBox a.btn {
            display: inline-block;
            margin-top: 35px;
            padding: 14px 40px;
            background: #e52e25;
            color: #fff;
            border-radius: 40px;
            font-weight: 700;
            letter-spacing: 1px;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 16px;
        }

        .content .imgBox {
            position: relative;
            width: 600px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding-right: 30px;
        }

        .content .imgBox .mainProduct {
            max-width: 440px;
            height: auto;
            position: relative;
            z-index: 2;
        }

        .content .imgBox .priceTag {
            position: absolute;
            bottom: -50px;
            right: 10px;
            max-width: 150px;
            height: auto;
            z-index: 3;
        }

        .thumb {
            position: absolute;
            bottom: 40px;
            left: 40%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            z-index: 20;
        }

        .thumb li {
            list-style: none;
            margin: 0 15px;
            cursor: pointer;
            transition: .3s;
        }

        .thumb li:hover {
            transform: translateY(-15px);
        }

        .thumb li img {
            max-height: 85px;
            width: auto;
        }

        .sci {
            position: absolute;
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        .sci li {
            list-style: none;
            margin: 15px 0;
        }

        .sci li a img {
            width: 26px;
            height: auto;
        }

        .circle {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #9bd435;
            clip-path: circle(600px at right 800px);
           }
    </style>
</head>
<body>
    
    <section>
        <div class="circle"></div>
        
        <header>
            <a href="#" class="logo"><img src="./imgs/tomato_rogo.png" alt="Logo"></a>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Menu</a></li>
                <li><a href="#">What's New</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </header>

        <div class="content">
            <div class="textBox">
                <img src="./imgs/title.png" alt="Title" class="titleImg">
                <a href="#" class="btn">Learn More</a>
            </div>

            <div class="imgBox">
                <img src="./imgs/tomato.3.png" alt="Tomato Crush" class="mainProduct">
                <img src="./imgs/tomatoma2.png" alt="800원" class="priceTag">
            </div>
        </div>

        <ul class="thumb">
            <li><img src="./imgs/pretz1.png" alt="pretz1" onclick="imgSlider('./imgs/tomato.3.png')"></li>
            <li><img src="./imgs/candy.png" alt="candy" onclick="imgSlider('./imgs/candy.png')"></li>
            <li><img src="./imgs/mychu.png" alt="mychu" onclick="imgSlider('./imgs/mychu.png')"></li>
        </ul>

        <ul class="sci">
            <li><a href="#"><img src="./imgs/twitter.png" alt="Twitter"></a></li>
            <li><a href="#"><img src="./imgs/facebook.png" alt="Facebook"></a></li>
            <li><a href="#"><img src="./imgs/instagram.png" alt="Instagram"></a></li>
        </ul>
    </section>

    <script>
        function imgSlider(anything) {
            document.querySelector('.mainProduct').src = anything;
        }
    </script>
</body>
</html>
